name: CI

on:
  pull_request:
  push:
    branches:
      - master
  # Reused as a release gate by release.yml.
  workflow_call:

jobs:
  secrets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Runs the gitleaks binary directly: gitleaks-action requires a paid license key
      # for organization-owned repos. Config + allowlisted fixtures: .gitleaks.toml.
      - name: Scan history for secrets
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz | tar xz gitleaks
          ./gitleaks git . --redact --verbose

  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: |
            **/*.csproj

      - name: Restore
        run: dotnet restore Proxytrace.sln --nologo

      - name: Build
        run: dotnet build Proxytrace.sln --nologo --no-restore

      - name: Test
        run: dotnet test Proxytrace.sln --nologo --verbosity minimal --no-restore
