name: CI

on:
  pull_request:
  push:
    branches:
      - master
  # Reused as a release gate by release.yml.
  workflow_call:

# Supersede in-flight runs on PR force-push/amend only; master pushes and
# release-gate (workflow_call) runs are never cancelled.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  secrets:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # Runs the gitleaks binary directly: gitleaks-action requires a paid license key
      # for organization-owned repos. Config + allowlisted fixtures: .gitleaks.toml.
      - name: Scan history for secrets
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz | tar xz gitleaks
          ./gitleaks git . --redact --verbose

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

  backend:
    runs-on: ubuntu-latest
    # A wedged test (a mocked call that never matches leaves the consume loop spinning) otherwise
    # runs to GitHub's 6h default. The suite finishes in a few minutes; 30 leaves ample headroom.
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: |
            **/*.csproj

      - name: Restore
        run: dotnet restore Proxytrace.sln --nologo

      - name: Build
        run: dotnet build Proxytrace.sln --nologo --no-restore

      - name: Test
        run: dotnet test Proxytrace.sln --nologo --verbosity minimal --no-restore

  # Builds the released all-in-one image and boots it, so a container that fails to come up
  # (initdb, supervisord, nginx upstream, migrations on a cold volume) is caught here rather
  # than after a release tag is pushed. Single-arch: the release build adds arm64.
  image:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build all-in-one image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/allinone/Dockerfile
          load: true
          tags: proxytrace:ci
          cache-from: type=gha,scope=allinone
          cache-to: type=gha,mode=max,scope=allinone

      # A cold volume: initdb runs, migrations apply, then all five processes must answer.
      - name: Smoke-test the container
        run: |
          docker run -d --name proxytrace -p 5101:80 -p 5102:8081 -v proxytrace-data:/data proxytrace:ci
          for i in $(seq 1 60); do
            status=$(docker inspect -f '{{.State.Health.Status}}' proxytrace)
            [[ "$status" == "healthy" ]] && break
            [[ "$status" == "unhealthy" ]] && break
            sleep 5
          done
          docker logs proxytrace
          [[ "$(docker inspect -f '{{.State.Health.Status}}' proxytrace)" == "healthy" ]] \
            || { echo "::error::container never became healthy"; exit 1; }
          # The UI, the bundled manual, the API behind nginx, and the ingestion proxy.
          curl -fsS -o /dev/null http://localhost:5101/
          curl -fsS -o /dev/null http://localhost:5101/docs/
          curl -fsS -o /dev/null http://localhost:5101/api/health
          curl -fsS -o /dev/null http://localhost:5102/health
