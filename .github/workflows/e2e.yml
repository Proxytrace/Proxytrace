name: E2E

on:
  pull_request:
  push:
    branches:
      - master
  # Reused as a release gate by release.yml (which passes secrets via `secrets: inherit`).
  workflow_call:

# Supersede in-flight runs on PR force-push/amend only; master pushes and
# release-gate (workflow_call) runs are never cancelled.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Boot e2e stack
        run: |
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml \
            up --build -d --wait
        timeout-minutes: 15

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install Playwright
        run: |
          npm ci
          npx playwright install chromium --with-deps
        working-directory: e2e

      - name: Run core + smoke + auth tests
        run: npx playwright test --project=core --project=smoke --project=auth-flows
        working-directory: e2e

      - name: Run LLM tests
        if: env.OPENAI_API_KEY != ''
        run: >-
          npx playwright test
          --project=llm-ingestion
          --project=llm-proxy-trace
          --project=llm-test-run
          --project=llm-playground
          --project=llm-evaluator-playground
        working-directory: e2e
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14

      - name: Tear down e2e stack
        if: always()
        run: |
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml down -v
