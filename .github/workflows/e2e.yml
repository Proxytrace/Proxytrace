name: E2E

on:
  pull_request:
  push:
    branches:
      - master
  # Reused as a release gate by release.yml (which passes secrets via `secrets: inherit`).
  workflow_call:

# Supersede in-flight runs on PR force-push/amend only; master pushes and
# release-gate (workflow_call) runs are never cancelled.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Boot e2e stack
        run: |
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml \
            up --build -d --wait
        timeout-minutes: 15

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install Playwright
        run: |
          npm ci
          npx playwright install chromium --with-deps
        working-directory: e2e

      - name: Run core + smoke + auth tests
        run: npx playwright test --project=core --project=smoke --project=auth-flows
        working-directory: e2e

      - name: Run LLM tests
        if: env.OPENAI_API_KEY != ''
        run: >-
          npx playwright test
          --project=llm-ingestion
          --project=llm-proxy-trace
          --project=llm-test-run
          --project=llm-playground
          --project=llm-evaluator-playground
        working-directory: e2e
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14

      # Runs before teardown: `down -v` destroys the containers and with them every
      # stack-side clue about why a spec failed (crash, restart, hang, 502 from nginx).
      - name: Capture e2e stack logs
        if: failure()
        run: |
          compose() {
            docker compose -f docker-compose.yml -f docker-compose.e2e.yml "$@"
          }
          mkdir -p stack-logs
          # Container states — exit codes, restart counts, health. Echoed into the job log
          # too, so the common cases need no artifact download at all.
          compose ps -a | tee stack-logs/compose-ps.txt || true
          # Combined log for cross-service correlation, plus one file per service because
          # the interleaved dump is unreadable at volume.
          compose logs --no-color --timestamps > stack-logs/compose-logs.txt 2>&1 || true
          for service in $(compose config --services); do
            compose logs --no-color --timestamps "$service" \
              > "stack-logs/$service.log" 2>&1 || true
          done
          # Restart counts, exit codes, OOMKilled — the "did it crash or hang?" evidence.
          compose ps -aq | xargs -r docker inspect \
            > stack-logs/docker-inspect.json 2>&1 || true

      - name: Upload e2e stack logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-stack-logs
          path: stack-logs/
          if-no-files-found: warn
          retention-days: 14

      - name: Tear down e2e stack
        if: always()
        run: |
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml down -v
