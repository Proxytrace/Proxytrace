name: CodeQL

# Static analysis via GitHub code scanning. Findings appear in the repo's
# Security tab; a PR fails its check when it introduces new alerts.
# C# is analyzed with build-mode `none` (no compilation needed), so this stays
# fast. Python is deliberately excluded — only stray helper scripts.

on:
  pull_request:
  push:
    branches:
      - master
  schedule:
    # Weekly re-scan so new CodeQL query releases surface findings
    # without waiting for the next commit.
    - cron: "17 6 * * 1"

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      contents: read
      actions: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: csharp
            build-mode: none
          - language: javascript-typescript
            build-mode: none
          - language: actions
            build-mode: none

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
