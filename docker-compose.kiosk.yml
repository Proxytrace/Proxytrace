# Isolated project name so the demo stack does not collide with the full split stack
# in docker-compose.yml.
name: proxytrace-kiosk

services:
  api:
    build:
      context: .
      dockerfile: Proxytrace.Api/Dockerfile
    ports:
      - "5200:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__Default=Data Source=/tmp/proxytrace.db
      - Kiosk__Enabled=true
      - Self__BaseUrl=http://localhost:5200
      - Frontend__AllowedOrigin=http://localhost:5201
      # Demo mode runs single-process with no proxy/Redis: ingestion stays in-process.
      - Messaging__Provider=InProcess

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5201:80"
    depends_on:
      - api
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
