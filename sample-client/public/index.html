<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chatbot — Trsr Sample</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<header>
  <div class="header-top">
    <h1>Trsr Sample Chatbot</h1>
    <span class="badge">
      <span class="badge-dot"></span>
      Routed through Trsr proxy &mdash; every message is captured in your traces
    </span>
  </div>
  <nav id="agent-tabs" aria-label="Select agent">
    <!-- Agent tabs are injected here by script.js -->
  </nav>
</header>

<div id="messages">
  <div class="empty-state" id="empty">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
    <p id="empty-text">Select an agent above and start chatting. All interactions will appear as traces in your Trsr dashboard.</p>
  </div>
</div>

<footer>
  <div id="input-row">
    <textarea
      id="input"
      rows="1"
      placeholder="Type a message… (Enter to send, Shift+Enter for new line)"
      autocomplete="off"
    ></textarea>
    <button id="send-btn" title="Send">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <path d="M2.01 21 23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>
  <div id="shortcuts-row">
    <span class="demo-label">Try a shortcut</span>
    <div id="shortcuts-list">
      <!-- Shortcut chips are injected here by script.js -->
    </div>
  </div>
  <p class="hint">
    Traces visible at <a href="http://localhost:4201" target="_blank">localhost:4201</a>
    &middot;
    <a href="https://github.com/jabbakadabra/trsr" target="_blank">Trsr on GitHub</a>
  </p>
</footer>

<script src="script.js"></script>
</body>
</html>
