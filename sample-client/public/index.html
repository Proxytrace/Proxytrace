<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chatbot — Trsr Sample</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-2: #22263a;
      --border: #2e3250;
      --accent: #6c63ff;
      --accent-dim: #4a44b5;
      --text: #e8eaf6;
      --text-muted: #8890b0;
      --user-bg: #2d2f4a;
      --assistant-bg: #1e2138;
      --radius: 12px;
      --font: system-ui, -apple-system, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      max-width: 760px;
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.72rem;
      color: var(--text-muted);
    }

    .badge-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #4caf50;
      flex-shrink: 0;
    }

    #messages {
      flex: 1;
      width: 100%;
      max-width: 760px;
      overflow-y: auto;
      padding: 24px 24px 12px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .message {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-width: 88%;
    }

    .message.user { align-self: flex-end; align-items: flex-end; }
    .message.assistant { align-self: flex-start; align-items: flex-start; }

    .message-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
    }

    .bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      line-height: 1.6;
      font-size: 0.925rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .user .bubble {
      background: var(--user-bg);
      border: 1px solid var(--border);
      border-bottom-right-radius: 4px;
    }

    .assistant .bubble {
      background: var(--assistant-bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .cursor::after {
      content: "▋";
      animation: blink 0.9s step-end infinite;
      color: var(--accent);
      margin-left: 1px;
    }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-muted);
      text-align: center;
      padding: 40px;
    }

    .empty-state svg { opacity: 0.35; }
    .empty-state p { font-size: 0.9rem; max-width: 300px; line-height: 1.5; }

    footer {
      width: 100%;
      max-width: 760px;
      padding: 12px 24px 24px;
    }

    #input-row {
      display: flex;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      transition: border-color 0.15s;
    }

    #input-row:focus-within { border-color: var(--accent); }

    #input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font);
      font-size: 0.925rem;
      resize: none;
      line-height: 1.5;
      max-height: 140px;
      overflow-y: auto;
    }

    #input::placeholder { color: var(--text-muted); }

    #send-btn {
      align-self: flex-end;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    #send-btn:hover:not(:disabled) { background: var(--accent-dim); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .hint {
      margin-top: 8px;
      font-size: 0.7rem;
      color: var(--text-muted);
      text-align: center;
    }

    .hint a { color: var(--accent); text-decoration: none; }
    .hint a:hover { text-decoration: underline; }

    .error .bubble { background: #3a1a1a; border-color: #7a2020; color: #f88; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <h1>Trsr Sample Chatbot</h1>
  <span class="badge">
    <span class="badge-dot"></span>
    Routed through Trsr proxy &mdash; every message is captured in your traces
  </span>
</header>

<div id="messages">
  <div class="empty-state" id="empty">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
    <p>Start chatting. All interactions will appear as traces in your Trsr dashboard.</p>
  </div>
</div>

<footer>
  <div id="input-row">
    <textarea
      id="input"
      rows="1"
      placeholder="Type a message… (Enter to send, Shift+Enter for new line)"
      autocomplete="off"
    ></textarea>
    <button id="send-btn" title="Send">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <path d="M2.01 21 23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>
  <p class="hint">
    Traces visible at <a href="http://localhost:4201" target="_blank">localhost:4201</a>
    &middot;
    <a href="https://github.com/jabbakadabra/trsr" target="_blank">Trsr on GitHub</a>
  </p>
</footer>

<script>
  const messagesEl = document.getElementById("messages");
  const emptyEl = document.getElementById("empty");
  const inputEl = document.getElementById("input");
  const sendBtn = document.getElementById("send-btn");

  const history = [];   // { role: "user"|"assistant", content: string }[]
  let streaming = false;

  function autoResize() {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + "px";
  }

  function addMessage(role, text = "") {
    emptyEl.style.display = "none";

    const wrapper = document.createElement("div");
    wrapper.className = `message ${role}`;

    const label = document.createElement("div");
    label.className = "message-label";
    label.textContent = role === "user" ? "You" : "Assistant";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;

    wrapper.appendChild(label);
    wrapper.appendChild(bubble);
    messagesEl.appendChild(wrapper);
    messagesEl.scrollTop = messagesEl.scrollHeight;

    return bubble;
  }

  function addError(text) {
    const wrapper = document.createElement("div");
    wrapper.className = "message assistant error";

    const label = document.createElement("div");
    label.className = "message-label";
    label.textContent = "Error";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;

    wrapper.appendChild(label);
    wrapper.appendChild(bubble);
    messagesEl.appendChild(wrapper);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function send() {
    const text = inputEl.value.trim();
    if (!text || streaming) return;

    inputEl.value = "";
    autoResize();
    streaming = true;
    sendBtn.disabled = true;

    history.push({ role: "user", content: text });
    addMessage("user", text);

    const assistantBubble = addMessage("assistant");
    assistantBubble.classList.add("cursor");
    let assistantText = "";

    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: history }),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error ?? `HTTP ${res.status}`);
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buf = "";

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;

        buf += decoder.decode(value, { stream: true });
        const lines = buf.split("\n");
        buf = lines.pop();

        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          const payload = line.slice(6);
          if (payload === "[DONE]") break;

          const json = JSON.parse(payload);
          if (json.error) throw new Error(json.error);
          assistantText += json.text ?? "";
          assistantBubble.textContent = assistantText;
          messagesEl.scrollTop = messagesEl.scrollHeight;
        }
      }

      history.push({ role: "assistant", content: assistantText });
    } catch (err) {
      assistantBubble.closest(".message").remove();
      addError(err.message);
    } finally {
      assistantBubble.classList.remove("cursor");
      streaming = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  inputEl.addEventListener("input", autoResize);
  sendBtn.addEventListener("click", send);
  inputEl.focus();
</script>
</body>
</html>
