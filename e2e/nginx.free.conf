# E2E-only nginx config for the free-tier frontend (`frontend-free`). Identical to
# frontend/nginx.conf except it proxies /api to the unlicensed `api-free` upstream
# instead of `api`, so the SPA served on :5103 talks to a Free-tier backend. This lets
# the `licensing` Playwright project exercise the free-tier feature gates while the
# default suite keeps running against the Enterprise `api`.
server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

    location /api {
        proxy_pass http://api-free:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
