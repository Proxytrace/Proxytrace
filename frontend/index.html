<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- CSP meta is injected at build time only (see vite.config.ts) so it covers
         both the nginx and .NET-wwwroot deployments without breaking dev HMR.
         Header-only directives (frame-ancestors, X-Frame-Options) live in nginx.conf. -->
    <meta name="referrer" content="same-origin" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#0a0f14" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Proxytrace</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
