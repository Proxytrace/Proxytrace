<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <title>Proxytrace</title>
  <rect width="512" height="512" fill="#0a0f14"/>
  <rect x="1" y="1" width="510" height="510" stroke="#1e2b38" stroke-width="2"/>
  <!-- scope graticule -->
  <path d="M64 160 H448 M64 352 H448" stroke="#182430" stroke-width="5"/>
  <path d="M64 256 H448" stroke="#7d95c9" stroke-opacity=".22" stroke-width="7"/>
  <!-- pulse -->
  <path d="M64 256 H150 L206 148 L294 364 L348 256 H408"
        stroke="#57c4d3" stroke-width="36" stroke-linecap="butt" stroke-linejoin="round"/>
  <!-- live cursor with ping rings -->
  <circle cx="430" cy="256" r="56" stroke="#7d95c9" stroke-opacity=".18" stroke-width="6"/>
  <circle cx="430" cy="256" r="40" stroke="#7d95c9" stroke-opacity=".4" stroke-width="7"/>
  <circle cx="430" cy="256" r="24" fill="#57c4d3"/>
</svg>
