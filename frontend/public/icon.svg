<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <title>Proxytrace</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1c1d24"/>
      <stop offset="1" stop-color="#121317"/>
    </linearGradient>
    <linearGradient id="stroke" x1="64" y1="0" x2="448" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#c68f46"/>
      <stop offset=".55" stop-color="#d9a158"/>
      <stop offset="1" stop-color="#ecbf83"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="20" flood-color="#d9a158" flood-opacity=".5"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect x="1" y="1" width="510" height="510" rx="111" stroke="#ffffff" stroke-opacity=".05" stroke-width="2"/>
  <!-- scope graticule -->
  <path d="M64 160 H448 M64 352 H448" stroke="#ffffff" stroke-opacity=".06" stroke-width="5"/>
  <path d="M64 256 H448" stroke="#74a8b6" stroke-opacity=".22" stroke-width="7"/>
  <!-- pulse -->
  <path d="M64 256 H150 L206 148 L294 364 L348 256 H408"
        stroke="url(#stroke)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- live cursor with ping rings -->
  <circle cx="430" cy="256" r="56" stroke="#74a8b6" stroke-opacity=".18" stroke-width="6"/>
  <circle cx="430" cy="256" r="40" stroke="#74a8b6" stroke-opacity=".4" stroke-width="7"/>
  <circle cx="430" cy="256" r="24" fill="#74a8b6"/>
</svg>
