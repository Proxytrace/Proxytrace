<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <title>Proxytrace</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1c1d24"/>
      <stop offset="1" stop-color="#121317"/>
    </linearGradient>
    <radialGradient id="glow" cx="256" cy="256" r="100" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#74a8b6" stop-opacity=".4"/>
      <stop offset="1" stop-color="#74a8b6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="topGlow" cx="256" cy="0" r="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d9a158" stop-opacity=".18"/>
      <stop offset="1" stop-color="#d9a158" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#topGlow)"/>
  <rect x="1" y="1" width="510" height="510" rx="111" stroke="#ffffff" stroke-opacity=".05" stroke-width="2"/>

  <circle cx="256" cy="256" r="100" fill="url(#glow)"/>
  <!-- outer ring -->
  <circle cx="256" cy="256" r="179" stroke="#d9a158" stroke-width="12" opacity="0.28"/>
  <!-- middle ring -->
  <circle cx="256" cy="256" r="128" stroke="#d9a158" stroke-width="13.6" opacity="0.55"/>
  <!-- dashed trace ring -->
  <circle cx="256" cy="256" r="85.3" stroke="#74a8b6" stroke-width="18.8" stroke-dasharray="27 31"/>
  <!-- core -->
  <circle cx="256" cy="256" r="44.4" fill="#d9a158"/>
</svg>
