# Security headers applied to every response. `always` ensures they're sent on
# error responses too. CSP is intentionally strict: the SPA loads only same-origin
# hashed assets (no inline <script>), so script-src stays 'self'. style-src needs
# 'unsafe-inline' for Tailwind/runtime inline style attributes. connect-src allows
# https so the OIDC authority + API + SSE work; frame-ancestors blocks clickjacking.
server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

    location /api {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # SSE access tokens ride in the query string (EventSource can't set headers).
        # Don't write them to the access log. Define `log_no_args` at the http level:
        #   log_format log_no_args '$remote_addr "$request_method $uri" $status';
        access_log off;
    }

    # Bundled VitePress manual. It ships a few trusted, static inline scripts (dark-mode
    # probe, page hash map), so /docs relaxes script-src to 'unsafe-inline'. nginx
    # `add_header` in a location replaces the server-level set, so all headers are
    # re-declared here. =404 (not the SPA index) keeps docs deep links resolving to files.
    location /docs {
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "same-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
        try_files $uri $uri/ =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
