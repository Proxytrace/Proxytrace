<div class="max-w-6xl mx-auto">
  <!-- Page header -->
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-xl font-semibold mb-1" style="color: var(--text-primary);">Traces</h1>
      <p class="text-sm" style="color: var(--text-muted);">All captured agent invocations.</p>
    </div>
  </div>

  <!-- Filters bar -->
  <div class="flex items-center gap-3 mb-4">
    <div class="flex-1 max-w-sm relative">
      <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 pointer-events-none"
           fill="none" stroke="currentColor" viewBox="0 0 24 24"
           style="color: var(--text-muted);">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M21 21l-4.35-4.35m0 0A7.5 7.5 0 104.65 4.65a7.5 7.5 0 0012.01 12.01z" />
      </svg>
      <input
        type="text"
        placeholder="Search traces..."
        [value]="searchQuery()"
        (input)="onSearch($event)"
        class="w-full pl-9 pr-3 py-2 text-sm rounded-md border outline-none transition-colors"
        style="background-color: var(--bg-card); border-color: var(--border-color); color: var(--text-primary);"
      />
    </div>
    <button
      class="px-3 py-2 text-sm rounded-md border transition-colors"
      style="background-color: var(--bg-card); border-color: var(--border-color); color: var(--text-secondary);">
      Filter
    </button>
  </div>

  <!-- Table -->
  <div class="rounded-lg border overflow-hidden" style="background-color: var(--bg-card); border-color: var(--border-color);">
    <!-- Table header -->
    <div class="grid text-xs font-medium px-4 py-3 border-b"
         style="grid-template-columns: 2fr 1fr 1fr 1fr 1fr; border-color: var(--border-color); color: var(--text-muted);">
      <span>Trace ID</span>
      <span>Agent</span>
      <span>Model</span>
      <span>Latency</span>
      <span>Timestamp</span>
    </div>

    <!-- Empty state -->
    <div class="flex flex-col items-center justify-center py-16 px-4">
      <div class="w-12 h-12 rounded-full flex items-center justify-center mb-4"
           style="background-color: var(--bg-secondary);">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"
             style="color: var(--text-muted);">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
        </svg>
      </div>
      <p class="text-sm font-medium mb-1" style="color: var(--text-secondary);">No traces captured yet</p>
      <p class="text-xs text-center max-w-xs" style="color: var(--text-muted);">
        Once you route your agent through the Trsr proxy, all LLM interactions will appear here.
      </p>
    </div>
  </div>

  <!-- Pagination placeholder -->
  <div class="flex items-center justify-between mt-4">
    <p class="text-xs" style="color: var(--text-muted);">0 traces</p>
    <div class="flex items-center gap-1">
      <button
        class="px-3 py-1.5 text-xs rounded border disabled:opacity-40"
        style="background-color: var(--bg-card); border-color: var(--border-color); color: var(--text-secondary);"
        disabled>
        Previous
      </button>
      <button
        class="px-3 py-1.5 text-xs rounded border disabled:opacity-40"
        style="background-color: var(--bg-card); border-color: var(--border-color); color: var(--text-secondary);"
        disabled>
        Next
      </button>
    </div>
  </div>
</div>
