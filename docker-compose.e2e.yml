# E2E testing overlay — always use with the base file:
#   docker compose -f docker-compose.yml -f docker-compose.e2e.yml <cmd>
# Adds healthchecks (required for --wait), fixes the JWT signing key, and
# ensures postgres is healthy before dependent services start.
# Run `docker compose ... down -v` to remove the named pgdata volume between runs.
name: proxytrace-e2e

services:
  postgres:
    ports: !reset
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proxytrace -d proxytrace"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  redis:
    ports: !reset []

  api:
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080 && printf \"GET /api/health HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\" >&3 && grep -q status <&3'"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - Authentication__Mode=Local
      - Authentication__Local__SigningKey=e2e-test-signing-key-32-chars-min!
      # Enables the test-support/seed endpoints (gated off in real deployments via TestOnlyEndpoint).
      - TestSupport__Enabled=true
      # E2e specs seed data and immediately assert it on the dashboard; the server-side dashboard
      # cache (default 10s) would serve a pre-seed payload and flake those assertions. Disable it.
      - Statistics__DashboardCacheTtlSeconds=0
      # Throwaway Enterprise license signed (ES256, kid 2026-05) with the TEST private key.
      # This stack's images are built with the LICENSE_PUBLIC_KEY build-arg baking in the
      # matching test public key (see docs/licensing.md). Official release images embed the
      # production key and reject this token, so committing it grants nothing.
      - PROXYTRACE_LICENSE=eyJhbGciOiJFUzI1NiIsInR5cCI6IkpXVCIsImtpZCI6IjIwMjYtMDUifQ..u6J5NJhOP7EUA2tKbRKQcs7T8gmPqXuwGIXiAIUpujUs1zikc-QCbK0x0y2dJWzd_ZIE4GlZgH1aaEGG1EaH_w

  proxy:
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080 && printf \"GET /health HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\" >&3 && grep -q 200 <&3'"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy

  frontend:
    depends_on:
      api:
        condition: service_healthy

  # Second API process with NO license configured → runs the Free tier (see LicenseService:
  # an empty PROXYTRACE_LICENSE means Free). It backs the `licensing` Playwright project, which
  # exercises the free-tier feature gates the Enterprise `api` can never show. Tier is purely a
  # function of this env var, so the same image serves both tiers side by side.
  #
  # Shares the SAME postgres database as `api` (the admin/project seeded by the setup spec is
  # reused — the licensing setup just logs in). To avoid racing migrations and competing for the
  # ingestion stream it (a) starts only after `api` is healthy (migrations already applied) and
  # (b) uses the InProcess message bus, so it never joins the Redis ingestion consumer group.
  api-free:
    build:
      context: .
      dockerfile: Proxytrace.Api/Dockerfile
      # Release (matches the primary `api`): a Debug build compiles in DebugLoginSeederHostedService,
      # which seeds debug@proxytrace.dev into the SHARED Postgres DB at boot — that makes
      # AnyUsersExist() true before auth.setup runs, so the setup spec's empty-DB precondition fails
      # and the whole suite is blocked. Tier is env-driven (empty PROXYTRACE_LICENSE = Free), not
      # build-config driven, so Release serves the Free tier just fine.
      args:
        BUILD_CONFIGURATION: Release
        # Identical to the base `api`/`proxy` build arg: bakes in the throwaway TEST license
        # public key. api-free runs Free tier (no PROXYTRACE_LICENSE) so it needs no key to
        # function, but matching the arg keeps this image layer-cache-shared with `api`.
        LICENSE_PUBLIC_KEY: "MFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAEeyQtYEJ6RaUJisEAZsCkJ4zHpUS2hS4ZBLV1nehbrIsUmSr7gW1qSqT3vBQdQFgwJdKt+Qol0+Ig+RwM29f6hQ=="
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080 && printf \"GET /api/health HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\" >&3 && grep -q status <&3'"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__Default=Host=postgres;Port=5432;Database=proxytrace;Username=proxytrace;Password=proxytrace
      - Kiosk__Enabled=false
      - Self__BaseUrl=http://localhost:5103
      - Frontend__AllowedOrigin=http://localhost:5103
      - Redis__ConnectionString=redis:6379
      - Messaging__Provider=InProcess
      - Authentication__Mode=Local
      - Authentication__Local__SigningKey=e2e-test-signing-key-32-chars-min!
      - TestSupport__Enabled=true
      # Same as `api`: keep e2e dashboard assertions deterministic (no server-side cache).
      - Statistics__DashboardCacheTtlSeconds=0
      # Share the SAME Data Protection key ring as `api` (mounts the same appdata volume below).
      # api-free reads the shared Postgres DB, so it must decrypt secrets (provider keys, protected
      # columns) the primary `api` encrypted — its own ephemeral key ring would throw
      # "key not found in the key ring" and 500 the request. See SecretProtectionModule.
      - PROXYTRACE_DATA_DIR=/app/data
      # Deliberately NO PROXYTRACE_LICENSE / PROXYTRACE_LICENSE_PUBLIC_KEY → Free tier.
    volumes:
      - appdata:/app/data

  # Free-tier SPA: same built frontend image, but its nginx proxies /api to api-free.
  # Exposed on :5103 so the `licensing` project's baseURL points at a Free-tier stack.
  frontend-free:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5103:80"
    depends_on:
      api-free:
        condition: service_healthy
    volumes:
      - ./e2e/nginx.free.conf:/etc/nginx/conf.d/default.conf:ro
