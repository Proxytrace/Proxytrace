# Performance-testing overlay — always use with the base file:
#   docker compose -f docker-compose.yml -f perf/docker-compose.perf.yml up -d --build postgres redis api --wait
#
# Exposes Postgres on :5433 so the in-process PerfHarness (seeder + DB-layer runner) can connect from
# the host, and the API on :5230 for the k6 HTTP load test. Adds healthchecks (required for --wait) and
# the same throwaway Enterprise license the e2e overlay uses, so the statistics endpoints are not
# license-gated. The API and the PerfHarness share one database — the harness seeds the rows the API
# then serves. Run `docker compose ... down -v` to drop the volume between runs (the seeder assumes a
# fresh, single-tenant database).
name: proxytrace-perf

services:
  # NOTE: use `!override` (not `!reset`) to replace the base file's port mappings. On Compose v2.20+
  # (`!reset` semantics), `ports: !reset` *removes* the key entirely, so Postgres/API publish NO host
  # ports and the host-side PerfHarness seeder fails with "connection refused" on :5433. `!override`
  # replaces the merged list with the value below, which is what we want.
  postgres:
    ports: !override
      - "5433:5432"
    # Light tuning so query plans/buffers are a touch more production-like than the tiny defaults.
    command: ["postgres", "-c", "shared_buffers=256MB", "-c", "max_connections=200", "-c", "work_mem=16MB"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proxytrace -d proxytrace"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  redis:
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    ports: !override
      - "5230:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080 && printf \"GET /api/health HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\" >&3 && grep -q status <&3'"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s
    environment:
      - Self__BaseUrl=http://localhost:5230
      - Authentication__Mode=Local
      - Authentication__Local__SigningKey=perf-test-signing-key-32-chars-minimum!
      # Throwaway Enterprise license (same TEST-key-signed token the e2e overlay uses) so
      # analytics/statistics endpoints are unlocked. The overlay reuses the root compose build
      # blocks, which bake the test public key via the LICENSE_PUBLIC_KEY build-arg (see
      # docs/licensing.md). Official release images embed the production key and reject it.
      - PROXYTRACE_LICENSE=eyJhbGciOiJFUzI1NiIsInR5cCI6IkpXVCIsImtpZCI6IjIwMjYtMDUifQ..u6J5NJhOP7EUA2tKbRKQcs7T8gmPqXuwGIXiAIUpujUs1zikc-QCbK0x0y2dJWzd_ZIE4GlZgH1aaEGG1EaH_w
