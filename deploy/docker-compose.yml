# Proxytrace production deployment.
#
# Quickstart (see README.md next to this file):
#   docker compose up -d
#   open http://localhost:5101
#
# Same image as `docker run ghcr.io/proxytrace/proxytrace` — the difference is that this file
# runs Postgres and Redis as their own containers and points the app at them. The app image
# only starts its embedded Postgres/Redis when ConnectionStrings__Default / Redis__ConnectionString
# are absent, so setting them here is what switches the database out. Prefer this shape for
# anything you care about: the database can then be backed up, tuned and upgraded on its own.
#
# No .env is required: the database password defaults (postgres is never exposed), the session
# signing key is generated and persisted on first start, and without a license key Proxytrace
# runs the Free tier. Copy .env.example to .env to override any of these — recommended for
# production: set your own POSTGRES_PASSWORD.
#
# The release artifact attached to each GitHub release ships this file with PROXYTRACE_VERSION
# pinned to that release. The in-repo copy tracks `latest`.
name: proxytrace

services:
  # Owns the schema; the app applies migrations on startup.
  # Not published to the host — uncomment the ports mapping for debugging only.
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=proxytrace
      # Internal-only (no host port is published). Override in .env for production.
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-proxytrace}
      - POSTGRES_DB=proxytrace
    # ports:
    #   - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proxytrace -d proxytrace"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  # Ingestion transport between the proxy and the API (both live in the app container).
  # Internal only.
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # The whole application: web UI + manual (nginx on :80), REST API, test runner, optimizer,
  # ingestion consumer, and the OpenAI-compatible ingestion proxy (:8081).
  proxytrace:
    image: ghcr.io/proxytrace/proxytrace:${PROXYTRACE_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      # Web UI (the browser opens this one).
      - "${FRONTEND_PORT:-5101}:80"
      # Ingestion proxy — point your agents' OpenAI base URL at http://<host>:5102/openai/v1.
      - "${PROXY_PORT:-5102}:8081"
    environment:
      # Set ⇒ the container's embedded Postgres/Redis stay down and these are used instead.
      - ConnectionStrings__Default=Host=postgres;Port=5432;Database=proxytrace;Username=proxytrace;Password=${POSTGRES_PASSWORD:-proxytrace}
      - Redis__ConnectionString=redis:6379
      # The URL users open in the browser: CORS origin and self-referencing links.
      - PROXYTRACE_PUBLIC_URL=${PROXYTRACE_PUBLIC_URL:-http://localhost:5101}
      # Ingestion endpoint the UI advertises to clients (setup wizard, API-keys page). Must
      # match how the proxy port is reachable from the outside — if you change PROXY_PORT or
      # front the proxy with your own hostname, set this too.
      - PROXYTRACE_PROXY_PUBLIC_URL=${PROXYTRACE_PROXY_PUBLIC_URL:-http://localhost:5102}
      # Optional: when unset, a signing key is generated on first start and persisted in the
      # data volume, so sessions survive restarts and upgrades.
      - Authentication__Local__SigningKey=${PROXYTRACE_SIGNING_KEY:-}
      # Optional license key (JWT). Leave empty for the Free tier; a license can also be set
      # later in the setup wizard or under Settings → License.
      - PROXYTRACE_LICENSE=${PROXYTRACE_LICENSE:-}
    volumes:
      # Generated secrets + the Data Protection key ring (it encrypts your stored provider
      # keys), and the Lucene search index. Back these up together with the database.
      # The mount points are the paths PROXYTRACE_DATA_DIR / Search__IndexPath default to, so
      # an installation upgrading from the pre-1.x three-container stack keeps both volumes
      # and their contents unchanged — the key ring keeps decrypting, the index stays warm.
      - appdata:/data/appdata
      - searchindex:/data/searchindex
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/api/health && curl -fsS http://127.0.0.1:8081/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

volumes:
  pgdata:
  appdata:
  searchindex:
