# Distinct project name so the full split stack does not collide with the single-process
# demo stack in docker-compose.kiosk.yml (which would otherwise share the default "proxytrace"
# project and recreate/orphan each other's containers).
name: proxytrace

services:
  # Shared database for both the app and the ingestion proxy. The app owns the schema
  # (runs initialization/migrations); the proxy connects read-only for API-key lookups.
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=proxytrace
      - POSTGRES_PASSWORD=proxytrace
      - POSTGRES_DB=proxytrace
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # Ingestion transport between the proxy (producer) and the app (consumer).
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # Main application: REST API, SSE, test runner, optimizer, search — and the ingestion
  # consumer worker. Does NOT forward agent traffic.
  api:
    build:
      context: .
      dockerfile: Proxytrace.Api/Dockerfile
      args:
        # Bake the throwaway TEST license public key so local/e2e/perf stacks trust the
        # committed test-signed license JWTs. Official release images pass no override and
        # embed the production key (see docs/licensing.md).
        LICENSE_PUBLIC_KEY: "MFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAEeyQtYEJ6RaUJisEAZsCkJ4zHpUS2hS4ZBLV1nehbrIsUmSr7gW1qSqT3vBQdQFgwJdKt+Qol0+Ig+RwM29f6hQ=="
    ports:
      - "5100:8080"
    depends_on:
      - postgres
      - redis
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__Default=Host=postgres;Port=5432;Database=proxytrace;Username=proxytrace;Password=proxytrace
      - Kiosk__Enabled=false
      - Self__BaseUrl=http://localhost:5100
      - Frontend__AllowedOrigin=http://localhost:5101
      - Proxy__PublicBaseUrl=http://localhost:5102
      - Redis__ConnectionString=redis:6379
      - Messaging__Provider=Redis
      # Persists the Data Protection key ring so the proxy (which mounts the same appdata volume)
      # can decrypt upstream provider keys this api encrypted. See docs/security.md.
      - PROXYTRACE_DATA_DIR=/app/data
    volumes:
      - appdata:/app/data

  # Standalone ingestion proxy: authenticates, forwards agent traffic upstream, and publishes
  # captured calls to Redis. Stays up independently of the app; scale this horizontally.
  proxy:
    build:
      context: .
      dockerfile: Proxytrace.Proxy/Dockerfile
      args:
        # Bake the throwaway TEST license public key so local/e2e/perf stacks trust the
        # committed test-signed license JWTs. Official release images pass no override and
        # embed the production key (see docs/licensing.md).
        LICENSE_PUBLIC_KEY: "MFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAEeyQtYEJ6RaUJisEAZsCkJ4zHpUS2hS4ZBLV1nehbrIsUmSr7gW1qSqT3vBQdQFgwJdKt+Qol0+Ig+RwM29f6hQ=="
    ports:
      - "5102:8080"
    depends_on:
      - postgres
      - redis
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__Default=Host=postgres;Port=5432;Database=proxytrace;Username=proxytrace;Password=proxytrace
      - Redis__ConnectionString=redis:6379
      # Shares the api's Data Protection key ring (same appdata volume) to decrypt upstream provider
      # keys before replaying them. Without this the proxy cannot read encrypted keys. See docs/security.md.
      - PROXYTRACE_DATA_DIR=/app/data
    volumes:
      - appdata:/app/data

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5101:80"
    depends_on:
      - api
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pgdata:
  # Data Protection key ring shared between api (writer) and proxy (reader) so the proxy can
  # decrypt upstream provider keys the api encrypted.
  appdata:
